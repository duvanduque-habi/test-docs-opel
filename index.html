<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrategia de Telemetría Cloud Run</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para procesar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 15s linear infinite;
        }
        .scale-102:hover {
            transform: scale(1.02);
        }
        body {
            background-color: #eaeff1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de icono simplificado para usar Lucide sin imports
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('native');

            const themeClasses = {
                blue: {
                    bgLight: 'bg-blue-50',
                    bgDark: 'bg-blue-900/40',
                    text: 'text-blue-500',
                    border: 'border-blue-500',
                    accent: 'bg-blue-500'
                },
                orange: {
                    bgLight: 'bg-orange-50',
                    bgDark: 'bg-orange-900/40',
                    text: 'text-orange-500',
                    border: 'border-orange-500',
                    accent: 'bg-orange-500'
                },
                purple: {
                    bgLight: 'bg-purple-50',
                    bgDark: 'bg-purple-900/40',
                    text: 'text-purple-500',
                    border: 'border-purple-500',
                    accent: 'bg-purple-500'
                }
            };

            const options = {
                native: {
                    title: "GCP Observability",
                    subtitle: "La opción integrada",
                    icon: "cloud",
                    color: "blue",
                    difficulty: "Muy Baja",
                    costMetric: "Bajo (Pago por uso)",
                    description: "Suite de herramientas integradas directamente en la consola de Google Cloud (Logging, Monitoring, Trace).",
                    pros: [
                        "Compatibilidad total con OTel: Google recomienda OTel para ingesta.",
                        "Seguridad nativa: Integración total con IAM.",
                        "Error Reporting: Agrupa excepciones automáticamente."
                    ],
                    cons: [
                        "Costos a escala: El almacenamiento de logs puede ser caro.",
                        "Vendor Lock-in: Difícil migrar alertas fuera de GCP."
                    ],
                    complexityScore: 20,
                    costScore: 40,
                    backendLabel: "GCP Observability Backend"
                },
                signoz: {
                    title: "SigNoz / OTel",
                    subtitle: "Control Total",
                    icon: "layers",
                    color: "orange",
                    difficulty: "Alta",
                    costMetric: "Medio (Infraestructura)",
                    description: "Alternativa Open Source basada en OpenTelemetry y ClickHouse para unificar métricas, trazas y logs.",
                    pros: [
                        "Estándar abierto: Facilita la migración futura.",
                        "OTel-Native: Sin traducciones, formato OTel puro.",
                        "Propiedad de datos: Los datos viven en tu infraestructura."
                    ],
                    cons: [
                        "Carga operativa: Debes gestionar la base de datos.",
                        "Configuración: Requiere OTel Collector intermedio."
                    ],
                    complexityScore: 90,
                    costScore: 70,
                    backendLabel: "SigNoz Backend (ClickHouse)"
                },
                enterprise: {
                    title: "Datadog / SaaS",
                    subtitle: "Alto Rendimiento",
                    icon: "zap",
                    color: "purple",
                    difficulty: "Baja",
                    costMetric: "Alto (Suscripción)",
                    description: "Plataformas SaaS líderes con análisis predictivo y AI para observabilidad avanzada.",
                    pros: [
                        "UI de Clase Mundial: Dashboards intuitivos.",
                        "AI-Powered: Detección automática de anomalías.",
                        "Mantenimiento cero: No gestionas servidores."
                    ],
                    cons: [
                        "Costo elevado: El cobro por instancia es caro.",
                        "Datos externos: La telemetría sale de tu red."
                    ],
                    complexityScore: 45,
                    costScore: 100,
                    backendLabel: "Datadog / SaaS Backend"
                }
            };

            const keyInsights = [
                {
                    title: "Control de Costos",
                    desc: "Cloud Logging es barato hasta que dejas logs de 'DEBUG' en producción. Configura alertas de presupuesto.",
                    icon: "dollar-sign",
                    bgColor: "bg-emerald-50",
                    borderColor: "border-emerald-100",
                    iconColor: "text-emerald-600"
                },
                {
                    title: "SigNoz != Serverless",
                    desc: "SigNoz requiere infraestructura fija (ClickHouse). Evalúa si tu equipo tiene capacidad de mantenimiento.",
                    icon: "server",
                    bgColor: "bg-orange-50",
                    borderColor: "border-orange-100",
                    iconColor: "text-orange-600"
                },
                {
                    title: "Seguridad IAM",
                    desc: "La opción nativa de GCP no requiere gestionar llaves de API externas, reduciendo riesgos de seguridad.",
                    icon: "lock",
                    bgColor: "bg-blue-50",
                    borderColor: "border-blue-100",
                    iconColor: "text-blue-600"
                },
                {
                    title: "Multi-Cloud",
                    desc: "Si usas AWS y GCP al mismo tiempo, las opciones SaaS suelen ser más eficientes para una vista única.",
                    icon: "globe",
                    bgColor: "bg-purple-50",
                    borderColor: "border-purple-100",
                    iconColor: "text-purple-600"
                }
            ];

            const current = options[activeTab];
            const currentTheme = themeClasses[current.color];

            return (
                <div className="min-h-screen p-4 md:p-8 pb-20">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-4xl font-extrabold text-slate-900 mb-2 tracking-tight">
                                Estrategia de Telemetría <span className="text-blue-600">Cloud Run</span>
                            </h1>
                            <p className="text-slate-600 max-w-2xl mx-auto italic">
                                Guía técnica para elegir y optimizar la observabilidad en Google Cloud
                            </p>
                        </header>

                        <section className="mb-12 overflow-hidden bg-white rounded-2xl shadow-sm border border-slate-200">
                            <div className="bg-slate-50 p-4 border-b border-slate-200 flex items-center gap-2">
                                <Icon name="activity" className="w-5 h-5 text-slate-400" />
                                <h2 className="font-bold text-slate-700 uppercase tracking-wider text-xs">Resumen Comparativo</h2>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse text-xs">
                                    <thead>
                                        <tr className="bg-white">
                                            <th className="p-4 border-b border-slate-100 text-slate-400 font-medium uppercase">Característica</th>
                                            <th className="p-4 border-b border-slate-100 font-bold text-blue-600 text-sm">GCP Native</th>
                                            <th className="p-4 border-b border-slate-100 font-bold text-orange-600 text-sm">SigNoz (OTel)</th>
                                            <th className="p-4 border-b border-slate-100 font-bold text-purple-600 text-sm">Datadog / SaaS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td className="p-4 border-b border-slate-50 font-semibold text-slate-600 bg-slate-50/30">Dificultad</td>
                                            <td className="p-4 border-b border-slate-50">Muy Baja</td>
                                            <td className="p-4 border-b border-slate-50 font-medium">Alta</td>
                                            <td className="p-4 border-b border-slate-50">Baja</td>
                                        </tr>
                                        <tr>
                                            <td className="p-4 border-b border-slate-50 font-semibold text-slate-600 bg-slate-50/30">Costo</td>
                                            <td className="p-4 border-b border-slate-50">Pago por uso</td>
                                            <td className="p-4 border-b border-slate-50">Infra Fija</td>
                                            <td className="p-4 border-b border-slate-50 font-medium text-rose-600">Suscripción Alta</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-8 space-y-6">
                                <div className="flex flex-wrap gap-3 mb-6">
                                    {Object.entries(options).map(([key, opt]) => (
                                        <button
                                            key={key}
                                            onClick={() => setActiveTab(key)}
                                            className={`flex items-center gap-3 px-5 py-3 rounded-xl transition-all duration-200 border-2 ${
                                                activeTab === key 
                                                ? `bg-white ${themeClasses[opt.color].border} shadow-md scale-105 z-10` 
                                                : 'bg-white border-transparent text-slate-500 hover:border-slate-200'
                                            }`}
                                        >
                                            <Icon name={opt.icon} className={`w-5 h-5 ${themeClasses[opt.color].text}`} />
                                            <div className="text-left leading-none font-bold text-xs">{opt.title}</div>
                                        </button>
                                    ))}
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
                                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-3">
                                        <span className={`p-2 rounded-lg ${currentTheme.bgLight}`}>
                                            <Icon name={current.icon} className={`w-6 h-6 ${currentTheme.text}`} />
                                        </span>
                                        {current.title}
                                    </h2>
                                    <div className="grid md:grid-cols-2 gap-8 text-xs">
                                        <div className="space-y-4">
                                            <h3 className="flex items-center gap-2 font-bold text-emerald-600 uppercase tracking-widest text-[10px]">Ventajas</h3>
                                            <div className="space-y-2">
                                                {current.pros.map((pro, idx) => (
                                                    <div key={idx} className="flex gap-3 text-slate-700 bg-emerald-50/40 p-3 rounded-xl border border-emerald-100/30">
                                                        <Icon name="chevron-right" className="w-4 h-4 text-emerald-500 shrink-0" />
                                                        <span>{pro}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <h3 className="flex items-center gap-2 font-bold text-rose-600 uppercase tracking-widest text-[10px]">Limitaciones</h3>
                                            <div className="space-y-2">
                                                {current.cons.map((con, idx) => (
                                                    <div key={idx} className="flex gap-3 text-slate-700 bg-rose-50/40 p-3 rounded-xl border border-rose-100/30">
                                                        <Icon name="chevron-right" className="w-4 h-4 text-rose-500 shrink-0" />
                                                        <span>{con}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#2a303c] text-slate-200 rounded-2xl p-8 shadow-lg relative overflow-hidden">
                                    <div className="absolute -bottom-8 -right-8 opacity-10">
                                        <Icon name="settings" className="w-48 h-48 animate-spin-slow" />
                                    </div>
                                    <h3 className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 mb-8 flex items-center gap-3">
                                        <Icon name="database" className="w-4 h-4" /> Flujo de Datos con OpenTelemetry
                                    </h3>
                                    <div className="flex flex-col md:flex-row items-center justify-center gap-6 relative z-10 text-xs font-bold">
                                        <div className="bg-[#3b4352] px-6 py-4 rounded-lg border border-slate-600 w-full md:w-48 text-center shadow-md">
                                            Cloud Run App (OTel SDK)
                                        </div>
                                        <Icon name="chevron-right" className="rotate-90 md:rotate-0 text-slate-600 w-5 h-5" />
                                        <div className="bg-transparent px-6 py-4 rounded-lg border-2 border-dashed border-blue-500/50 w-full md:w-40 text-center text-[11px] italic text-blue-300">
                                            {activeTab === 'signoz' ? 'OTel Collector' : 'OTel Exporter'}
                                        </div>
                                        <Icon name="chevron-right" className="rotate-90 md:rotate-0 text-slate-600 w-5 h-5" />
                                        <div className="bg-gradient-to-br from-slate-700 to-slate-800 px-6 py-4 rounded-lg border border-blue-500/50 w-full md:w-56 text-center shadow-xl">
                                            {current.backendLabel}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-4 space-y-6">
                                <div className="relative group overflow-hidden bg-gradient-to-br from-indigo-600 to-violet-700 rounded-2xl p-8 text-white shadow-xl border border-white/10 h-full max-h-[420px] flex flex-col justify-between">
                                    <div className="absolute -bottom-4 -right-4 opacity-20 transform group-hover:scale-110 transition-transform">
                                        <Icon name="zap" className="w-40 h-40" />
                                    </div>
                                    <div className="relative z-10">
                                        <div className="flex items-center gap-2 mb-6">
                                            <span className="text-2xl">💡</span>
                                            <h3 className="text-xl font-extrabold tracking-tight">El Poder de OTel</h3>
                                        </div>
                                        <p className="text-indigo-50/90 text-sm leading-relaxed">
                                            Instrumentar con <span className="font-bold text-white">OpenTelemetry</span> te permite cambiar de proveedor de telemetría sin tocar una sola línea de código.
                                        </p>
                                    </div>
                                    <button className="w-full bg-white/20 hover:bg-white/30 py-3 rounded-xl text-xs font-bold border border-white/20 backdrop-blur-sm mt-8">
                                        Guía de Migración OTel
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 gap-4">
                                    {keyInsights.map((insight, idx) => (
                                        <div key={idx} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex gap-4 items-start">
                                            <div className={`p-2 rounded-lg ${insight.bgColor}`}>
                                                <Icon name={insight.icon} className={`w-4 h-4 ${insight.iconColor}`} />
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-xs mb-1">{insight.title}</h4>
                                                <p className="text-[10px] text-slate-500 leading-tight">{insight.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <footer className="mt-20 text-center text-slate-400 text-[10px] border-t border-slate-200/50 pt-8 uppercase tracking-widest">
                            Guía Técnica de Observabilidad para Arquitecturas Modernas en GCP • 2024
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
